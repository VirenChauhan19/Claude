<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overwatch Hero Gallery</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- TOP INFO BAR -->
    <div id="top-bar">
        <div id="header-container">
            <h1 id="main-header">SELECT YOUR HERO</h1>
            <p id="sub-header">PLEASE SELECT YOUR AGENT</p>
        </div>
        <div id="timer-container">
            <span id="timer-label">Time Remaining</span>
            <span id="timer-count">60</span>
        </div>
    </div>

    <!-- HERO PREVIEW AREA (CENTER) -->
    <div id="preview-area">
        <img id="preview-img" src="" alt="">
        <h2 id="preview-name">Select Your Hero</h2>
        <button id="lock-btn" onclick="lockHero()">Lock In</button>
    </div>

    <!-- HERO SELECTION GALLERY (BOTTOM) -->
    <div class="gallery">
        <!-- GHOST -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'GHOST', 'https://images.unsplash.com/photo-1595152452543-e5fc28ebc2b8?auto=format&fit=crop&q=80&w=1000')" onmouseleave="leaveHero()">
            <img src="https://images.unsplash.com/photo-1595152452543-e5fc28ebc2b8?auto=format&fit=crop&q=80&w=1000" alt="Ghost">
        </div>

        <!-- PRICE -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'PRICE', 'https://images.unsplash.com/photo-1584464431034-2976a79ad65d?auto=format&fit=crop&q=80&w=1000')" onmouseleave="leaveHero()">
            <img src="https://images.unsplash.com/photo-1584464431034-2976a79ad65d?auto=format&fit=crop&q=80&w=1000" alt="Price">
        </div>

        <!-- SOAP -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'SOAP', 'https://images.unsplash.com/photo-1509248961158-e54f6934749c?auto=format&fit=crop&q=80&w=1000')" onmouseleave="leaveHero()">
            <img src="https://images.unsplash.com/photo-1509248961158-e54f6934749c?auto=format&fit=crop&q=80&w=1000" alt="Soap">
        </div>
        
        <!-- GAZ -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'GAZ', 'https://images.unsplash.com/photo-1579373903781-fd5c0c30c4cd?auto=format&fit=crop&q=80&w=1000')" onmouseleave="leaveHero()">
            <img src="https://images.unsplash.com/photo-1579373903781-fd5c0c30c4cd?auto=format&fit=crop&q=80&w=1000" alt="Gaz">
        </div>

        <!-- ALEJANDRO -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'ALEJANDRO', 'https://images.unsplash.com/photo-1628744448840-55bdb2497bd4?auto=format&fit=crop&q=80&w=1000')" onmouseleave="leaveHero()">
            <img src="https://images.unsplash.com/photo-1628744448840-55bdb2497bd4?auto=format&fit=crop&q=80&w=1000" alt="Alejandro">
        </div>
    </div>

    <script src="js/app.js"></script>

</body>
</html>
