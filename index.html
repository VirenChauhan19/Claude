<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call of Duty: Hero Selection</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- TOP INFO BAR -->
    <div id="top-bar">
        <div id="header-container">
            <h1 id="main-header">SELECT YOUR HERO</h1>
            <p id="sub-header">PLEASE SELECT YOUR AGENT</p>
        </div>
        <div id="timer-container">
            <span id="timer-label">Time Remaining</span>
            <span id="timer-count">60</span>
        </div>
    </div>

    <!-- HERO PREVIEW AREA (CENTER) -->
    <div id="preview-area">
        <img id="preview-img" src="" alt="">
        <h2 id="preview-name">SELECT AGENT</h2>
        <button id="lock-btn" onclick="lockHero()">Lock In</button>
    </div>

    <!-- HERO SELECTION GALLERY (BOTTOM) -->
    <div class="gallery">
        <!-- GHOST -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'GHOST', 'https://images.unsplash.com/photo-1590412200988-a436970781fa?auto=format&fit=crop&q=80&w=600&h=800')" onmouseleave="leaveHero()">
            <img src="https://images.unsplash.com/photo-1590412200988-a436970781fa?auto=format&fit=crop&q=80&w=600&h=800" alt="GHOST">
        </div>

        <!-- CAPT. PRICE -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'CAPT. PRICE', 'https://images.unsplash.com/photo-1506318137071-a8e063b4bcc0?auto=format&fit=crop&q=80&w=600&h=800')" onmouseleave="leaveHero()">
            <img src="https://images.unsplash.com/photo-1506318137071-a8e063b4bcc0?auto=format&fit=crop&q=80&w=600&h=800" alt="CAPT. PRICE">
        </div>

        <!-- SOAP -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'SOAP', 'https://images.unsplash.com/photo-1570158268183-d296b2892211?auto=format&fit=crop&q=80&w=600&h=800')" onmouseleave="leaveHero()">
            <img src="https://images.unsplash.com/photo-1570158268183-d296b2892211?auto=format&fit=crop&q=80&w=600&h=800" alt="SOAP">
        </div>
        
        <!-- GAZ -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'GAZ', 'https://images.unsplash.com/photo-1531844251246-9a1bfaae09fc?auto=format&fit=crop&q=80&w=600&h=800')" onmouseleave="leaveHero()">
            <img src="https://images.unsplash.com/photo-1531844251246-9a1bfaae09fc?auto=format&fit=crop&q=80&w=600&h=800" alt="GAZ">
        </div>

        <!-- ALEJANDRO -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'ALEJANDRO', 'https://images.unsplash.com/photo-1628744448840-55bdb2497bd4?auto=format&fit=crop&q=80&w=600&h=800')" onmouseleave="leaveHero()">
            <img src="https://images.unsplash.com/photo-1628744448840-55bdb2497bd4?auto=format&fit=crop&q=80&w=600&h=800" alt="ALEJANDRO">
        </div>
    </div>

    <script src="js/app.js"></script>

</body>
</html>
