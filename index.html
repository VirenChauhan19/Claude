<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Selection Module</title>
    <!-- External CSS Link -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>Select Your Faction</h1>

    <div class="container">
        <!-- HERO 1: MAGE -->
        <div class="card" onclick="selectHero('The Mage')">
            <span class="hero-type">Damage</span>
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Mage&backgroundColor=1a1a2e" alt="Mage">
            <h2>The Mage</h2>
        </div>

        <!-- HERO 2: KNIGHT -->
        <div class="card" onclick="selectHero('The Knight')">
            <span class="hero-type">Tank</span>
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Knight&backgroundColor=1a1a2e" alt="Knight">
            <h2>The Knight</h2>
        </div>

        <!-- HERO 3: ROGUE -->
        <div class="card" onclick="selectHero('The Rogue')">
            <span class="hero-type">Support</span>
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Rogue&backgroundColor=1a1a2e" alt="Rogue">
            <h2>The Rogue</h2>
        </div>
    </div>

    <!-- Feedback UI -->
    <div id="selection-overlay">No character selected</div>

    <!-- External JS Link -->
    <script src="js/app.js"></script>

</body>
</html>
