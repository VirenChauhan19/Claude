<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call of Duty: Task Force 141</title>
    <link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>

    <!-- TOP INFO BAR -->
    <div id="top-bar">
        <div id="header-container">
            <h1 id="main-header">SELECT YOUR HERO</h1>
            <p id="sub-header">PLEASE SELECT YOUR AGENT</p>
        </div>
        <div id="timer-container">
            <span id="timer-label">Time Remaining</span>
            <span id="timer-count">60</span>
        </div>
    </div>

    <!-- HERO PREVIEW AREA (CENTER) -->
    <div id="preview-area">
        <img id="preview-img" src="" alt="">
        <h2 id="preview-name">SELECT AGENT</h2>
        <button id="lock-btn" onclick="lockHero()">Lock In</button>
    </div>

    <!-- HERO SELECTION GALLERY (BOTTOM) -->
    <div class="gallery">
        <!-- GHOST -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'GHOST', 'https://images.pexels.com/photos/28779623/pexels-photo-28779623.jpeg?auto=compress&cs=tinysrgb&w=800')" onmouseleave="leaveHero()">
            <img src="https://images.pexels.com/photos/28779623/pexels-photo-28779623.jpeg?auto=compress&cs=tinysrgb&w=800" alt="GHOST">
        </div>

        <!-- CAPT. PRICE -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'CAPT. PRICE', 'https://images.pexels.com/photos/7468185/pexels-photo-7468185.jpeg?auto=compress&cs=tinysrgb&w=800')" onmouseleave="leaveHero()">
            <img src="https://images.pexels.com/photos/7468185/pexels-photo-7468185.jpeg?auto=compress&cs=tinysrgb&w=800" alt="CAPT. PRICE">
        </div>

        <!-- SOAP -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'SOAP', 'https://images.pexels.com/photos/10895248/pexels-photo-10895248.jpeg?auto=compress&cs=tinysrgb&w=800')" onmouseleave="leaveHero()">
            <img src="https://images.pexels.com/photos/10895248/pexels-photo-10895248.jpeg?auto=compress&cs=tinysrgb&w=800" alt="SOAP">
        </div>

        <!-- GAZ -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'GAZ', 'https://images.pexels.com/photos/29656076/pexels-photo-29656076.jpeg?auto=compress&cs=tinysrgb&w=800')" onmouseleave="leaveHero()">
            <img src="https://images.pexels.com/photos/29656076/pexels-photo-29656076.jpeg?auto=compress&cs=tinysrgb&w=800" alt="GAZ">
        </div>

        <!-- ALEJANDRO -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'ALEJANDRO', 'https://images.pexels.com/photos/5491890/pexels-photo-5491890.jpeg?auto=compress&cs=tinysrgb&w=800')" onmouseleave="leaveHero()">
            <img src="https://images.pexels.com/photos/5491890/pexels-photo-5491890.jpeg?auto=compress&cs=tinysrgb&w=800" alt="ALEJANDRO">
        </div>
    </div>

    <!-- LOCK-IN CINEMATIC OVERLAY ELEMENTS -->
    <div id="lock-flash-overlay" style="display:none"></div>
    <div id="lock-banner" style="display:none">AGENT LOCKED</div>

    <script src="js/app.js?v=4"></script>

</body>
</html>
