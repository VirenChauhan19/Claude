<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overwatch Hero Gallery</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- HERO PREVIEW AREA (CENTER) -->
    <div id="preview-area">
        <img id="preview-img" src="" alt="">
        <h2 id="preview-name">Select Your Hero</h2>
        <button id="lock-btn" onclick="lockHero()">Lock In</button>
    </div>

    <!-- HERO SELECTION GALLERY (BOTTOM) -->
    <div class="gallery">
        <!-- MAGE -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'The Mage', 'https://api.dicebear.com/7.x/avataaars/svg?seed=Mage&backgroundColor=1a1a2e')" onmouseleave="leaveHero()">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Mage&backgroundColor=1a1a2e" alt="Mage">
        </div>

        <!-- KNIGHT -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'The Knight', 'https://api.dicebear.com/7.x/avataaars/svg?seed=Knight&backgroundColor=1a1a2e')" onmouseleave="leaveHero()">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Knight&backgroundColor=1a1a2e" alt="Knight">
        </div>

        <!-- ROGUE -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'The Rogue', 'https://api.dicebear.com/7.x/avataaars/svg?seed=Rogue&backgroundColor=1a1a2e')" onmouseleave="leaveHero()">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Rogue&backgroundColor=1a1a2e" alt="Rogue">
        </div>
        
        <!-- EXTRA HEROES TO MAKE IT LOOK LIKE A FULL GALLERY -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'The Archer', 'https://api.dicebear.com/7.x/avataaars/svg?seed=Archer&backgroundColor=1a1a2e')" onmouseleave="leaveHero()">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Archer&backgroundColor=1a1a2e" alt="Archer">
        </div>
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'The Cleric', 'https://api.dicebear.com/7.x/avataaars/svg?seed=Cleric&backgroundColor=1a1a2e')" onmouseleave="leaveHero()">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Cleric&backgroundColor=1a1a2e" alt="Cleric">
        </div>
    </div>

    <script src="js/app.js"></script>

</body>
</html>
