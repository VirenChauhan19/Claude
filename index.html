<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overwatch Hero Gallery</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- TOP INFO BAR -->
    <div id="top-bar">
        <div id="header-container">
            <h1 id="main-header">SELECT YOUR HERO</h1>
            <p id="sub-header">PLEASE SELECT YOUR AGENT</p>
        </div>
        <div id="timer-container">
            <span id="timer-label">Time Remaining</span>
            <span id="timer-count">60</span>
        </div>
    </div>

    <!-- HERO PREVIEW AREA (CENTER) -->
    <div id="preview-area">
        <img id="preview-img" src="" alt="">
        <h2 id="preview-name">Select Your Hero</h2>
        <button id="lock-btn" onclick="lockHero()">Lock In</button>
    </div>

    <!-- HERO SELECTION GALLERY (BOTTOM) -->
    <div class="gallery">
        <!-- MAGE -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'The Mage', 'https://images.unsplash.com/photo-1514316454349-750a7fd3da3a?auto=format&fit=crop&q=80&w=1000')" onmouseleave="leaveHero()">
            <img src="https://images.unsplash.com/photo-1514316454349-750a7fd3da3a?auto=format&fit=crop&q=80&w=1000" alt="Mage">
        </div>

        <!-- KNIGHT -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'The Knight', 'https://images.unsplash.com/photo-1599708144101-024f07a635a8?auto=format&fit=crop&q=80&w=1000')" onmouseleave="leaveHero()">
            <img src="https://images.unsplash.com/photo-1599708144101-024f07a635a8?auto=format&fit=crop&q=80&w=1000" alt="Knight">
        </div>

        <!-- ROGUE -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'The Rogue', 'https://images.unsplash.com/photo-1506440905961-0ab11f2ee5bc?auto=format&fit=crop&q=80&w=1000')" onmouseleave="leaveHero()">
            <img src="https://images.unsplash.com/photo-1506440905961-0ab11f2ee5bc?auto=format&fit=crop&q=80&w=1000" alt="Rogue">
        </div>
        
        <!-- ARCHER -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'The Archer', 'https://images.unsplash.com/photo-1605142859862-978be7eba909?auto=format&fit=crop&q=80&w=1000')" onmouseleave="leaveHero()">
            <img src="https://images.unsplash.com/photo-1605142859862-978be7eba909?auto=format&fit=crop&q=80&w=1000" alt="Archer">
        </div>

        <!-- CLERIC -->
        <div class="hero-thumb" onmouseenter="hoverHero(this, 'The Cleric', 'https://images.unsplash.com/photo-1505664194779-8beaceb93744?auto=format&fit=crop&q=80&w=1000')" onmouseleave="leaveHero()">
            <img src="https://images.unsplash.com/photo-1505664194779-8beaceb93744?auto=format&fit=crop&q=80&w=1000" alt="Cleric">
        </div>
    </div>

    <script src="js/app.js"></script>

</body>
</html>
